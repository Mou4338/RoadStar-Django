apiVersion: apps/v1
kind: Deployment
metadata:
  name: roadstar
  labels:
    app: roadstar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: roadstar
  template:
    metadata:
      labels:
        app: roadstar
    spec:
      containers:
        - name: roadstar
          image: roadstar:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: roadstar-service
spec:
  selector:
    app: roadstar
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
